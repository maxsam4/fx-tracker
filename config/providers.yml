# fx-tracker provider manifest
# Edit + restart the worker to add/remove pairs or providers.
#
# Reliability tiers (verified live 2026-05-03):
#   API-backed (verified working):
#     wise, remitly, xoom, instarem, aspora, westernUnion, careemPay — direct JSON APIs
#   Scrape-based (best-effort, may fail on first deploy):
#     masarif, lulu, remitfinder
#     -> these need selector tuning against the live DOM. Failures show in
#        provider_runs (status='error') and do NOT block other providers.
#        Run `pnpm --filter @fx/core test:live:scrape` to validate selectors.
#
# Reference sources for the mid-market median:
#   xe — verified live
#   exchangerateHost (open.er-api.com) — verified live, free, no key
#   (wiseMidMarket dropped 2026-05-03: Wise also appears as a remittance
#    provider, so its mid-market reading was effectively redundant.)
#
# Reference sources display-only (not in median):
#   googleFinance — verified live; intentionally excluded from median because
#                   it lags the market by 5-15 min.

pairs:
  USD-INR:
    enabled: true
    referenceAmounts: [100000]               # USD — single fixed comparison amount
    providers:
      - wise              # API
      - remitly           # via Wise comparisons
      - xoom              # via Wise comparisons (PayPal-owned)
      - instarem          # direct API + Wise fallback
      - aspora            # direct API
      - westernUnion      # API (wuconnect/prices/catalog, Direct-to-Bank)
      - remitfinder       # SCRAPE — corridor URLs return only popular preview; needs work
    referenceSources:
      - googleFinance

  AED-INR:
    enabled: true
    referenceAmounts: [100000]               # AED — single fixed comparison amount
    providers:
      - wise              # API (Wise comparisons may return empty for AED-INR)
      - aspora            # direct API
      - remitly           # direct SSR scrape (remitly.com/ae/en/currency-converter/aed-to-inr-rate)
      - masarif           # SCRAPE aggregator (LuLu, Al Ansari, Sharaf, ...)
      - westernUnion      # API (UAE retail catalog via WRET channel)
      - careemPay         # API (platform.careemapis.com remittance-widget-rates)
      - lulu              # SCRAPE direct (complements masarif)
      - remitfinder       # SCRAPE
      # Note: Instarem's public API rejects AED→INR ("Invalid combination of
      # country-currency details") — they don't operate that corridor.
    referenceSources:
      - googleFinance

midMarket:
  # Median of these is the canonical mid-market rate. With only 2 sources
  # the median is the average; if you ever see "All mid-market sources
  # marked as outliers", consider loosening outlierTolerancePct or adding
  # a third source.
  sources: [xe, exchangerateHost]
  # Tracked, displayed, never feeds alerts.
  referenceOnly: [googleFinance]
  # Drop sources whose rate deviates more than this from the median of survivors.
  outlierTolerancePct: 2.0

# Aggregator dedup: when both an aggregator and a direct scrape return the
# same providerId (e.g., 'lulu' from both masarif and lulu_direct), the
# winner is the source listed here.
preferredSource:
  lulu: masarif
  alAnsari: masarif
  sharaf: masarif
