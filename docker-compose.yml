services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fxtracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace_me}
      POSTGRES_DB: ${POSTGRES_DB:-fxtracker}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fxtracker}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      SESSION_SECRET: ${SESSION_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POLL_INTERVAL_CRON: ${POLL_INTERVAL_CRON:-0 * * * *}
      ALERT_TICK_CRON: ${ALERT_TICK_CRON:-*/1 * * * *}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID}
      TELEGRAM_BOT_PIN: ${TELEGRAM_BOT_PIN}
      TWELVE_DATA_API_KEY: ${TWELVE_DATA_API_KEY:-}
      XE_API_AUTH: ${XE_API_AUTH:-}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
